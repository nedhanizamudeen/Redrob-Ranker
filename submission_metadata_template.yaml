  - "Claude"        # e.g. for architecture discussion, code review

ai_usage_summary: |
  Used Claude for architectural discussion and code review. 
  No candidate data was fed to any LLM. 
  All scoring logic, weight decisions, and JD analysis were done by me.

# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  Multi-signal recruiter-logic scorer with three components: skill match (42%),
  career trajectory (35%), and behavioral availability (23%). Skill matching
  weighs career-description evidence above skill-list claims to avoid keyword
  stuffers. Career trajectory explicitly penalizes JD-disqualified patterns
  such as consulting-only backgrounds, pure research roles, and CV/speech
  specialists. Availability scoring uses all 23 behavioral signals with
  emphasis on recency, recruiter response rate, and notice period. Honeypot
  detection filters impossible timeline profiles before scoring. Pure Python
  stdlib, no external dependencies, runs in ~45 seconds on CPU.

# ============================================================================
# Declarations
# ============================================================================
declarations:
  read_submission_spec: true        # I have read submission_spec.md in full
  code_is_original_work: true       # My code is my team's original work (using AI as a tool is fine)
  no_collusion: true                # I have not coordinated my submission with other teams
  honeypot_check_done: true        # OPTIONAL — set true if you explicitly checked for honeypots in your ranking
  reproduction_tested: true         # I have tested that my reproduce_command runs end-to-end
